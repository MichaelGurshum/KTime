/* ═══════════════════════════════════════

═══════════════════════════════════════ */
const NS = "http://www.w3.org/2000/svg";

function mk(tag, a) {
  const el = document.createElementNS(NS, tag);
  for (const [k,v] of Object.entries(a||{})) el.setAttribute(k,v);
  return el;
}

function sKey(s)     { return SEFI_KEY[s] || 'chesed'; }
function sSvgCls(s)  { return 'rs-' + sKey(s); }
function sColor(s)   { return SEFI_COLOR[sKey(s)] || SEFI_COLOR.tiferet; }
function dlSef(s) {
  const k = sKey(s);
  return 'dl-sef dl-s-' + (k === 'tiferet' && s === 'כתר' ? 'keter' : k);
}

/* pill(name, sefirah, abbrevHtml) — colored bordered chip with optional status line */
function pill(name, sef, abbrevHtml) {
  return pillWithExtra(name, sef, abbrevHtml, null);
}

/* pillWithExtra — pill with optional extra HTML row below the abbrev line */
function pillWithExtra(name, sef, abbrevHtml, extraHtml) {
  const k = sef === 'כתר' ? 'keter' : sKey(sef);
  const abLine = abbrevHtml
    ? `<span class="sab-line">${abbrevHtml}</span>`
    : '';
  const exLine = extraHtml || '';
  return `<span class="pill pill-${k}">`+
    `<span class="pill-body">`+
    `<span class="pill-name">${name}</span>`+
    `<span class="pill-tag">${sef}</span>`+
    `</span>`+
    abLine+
    exLine+
    `</span>`;
}

/* year-value chip */
function yvChip(str, lbl, sef) {
  const k = sef === 'כתר' ? 'keter' : sKey(sef);
  return `<span class="yv-chip dl-s-${k}">`+
    `<span class="yv-top">`+
    `<span class="yv-str">${str}</span>`+
    `<span class="yv-dash">—</span>`+
    `<span class="yv-sef">${sef}</span>`+
    `</span>`+
    `</span>`;
}

function toHN(n) {
  const t = ["","א","ב","ג","ד","ה","ו","ז","ח","ט",
    "י","יא","יב","יג","יד","טו","טז","יז","יח","יט",
    "כ","כא","כב","כג","כד","כה","כו","כז","כח","כט",
    "ל","לא","לב","לג","לד","לה","לו","לז","לח","לט",
    "מ","מא","מב","מג","מד","מה","מו","מז","מח","מט","נ"];
  return t[n] || String(n);
}

/*
 * yearLetters(y) — returns just the last-3 abbreviation string e.g. "תשפו"
 * fullYearStr(y) — e.g. "ה׳תשפ״ו"
 * yearComponents(y) — returns array of {str, val, sef} for display
 */
function yearLetters(y) {
  const mod=y%1000;
  const hh=Math.floor(mod/100), tt=Math.floor((mod%100)/10), oo=mod%10;
  const hundV=hh*100, tenV=tt*10;
  let r=HUNDREDS_STR[hundV]||"";
  // special Gershayim cases
  if (tt===1&&oo===5) r+="טו";
  else if (tt===1&&oo===6) r+="טז";
  else {
    if (tenV) r+=TENS_STR[tenV]||"";
    if (oo)   r+=UNITS_STR[oo]||"";
  }
  return r;
}

function fullYearStr(y) {
  const mil=Math.floor(y/1000);
  const mH=["","א","ב","ג","ד","ה","ו","ז","ח","ט"][mil]||"";
  const chars=yearLetters(y).split("");
  if (chars.length>=2) chars.splice(chars.length-1,0,"״");
  else chars.push("׳");
  return mH+"׳"+chars.join("");
}

/*
 * Returns array of place-value components for the year, each with:
 *   { str: "תש", label: "700 — שבע מאות", sef: "הוד", css: "hod" }
 */
function yearComponents(y) {
  const mil=Math.floor(y/1000);
  const mod=y%1000;
  const hh=Math.floor(mod/100), tt=Math.floor((mod%100)/10), oo=mod%10;
  const hundV=hh*100, tenV=tt*10;
  const milStr=["","א","ב","ג","ד","ה","ו","ז","ח","ט"][mil]||"";
  const milLabels=["","אחד","שניים","שלושה","ארבעה","חמשה","ששה","שבעה"];
  const tenLabels={10:"עשרה",20:"עשרים",30:"שלושים",40:"ארבעים",50:"חמישים",
                   60:"ששים",70:"שבעים",80:"שמונים",90:"תשעים"};
  const unitLabels={1:"אחת",2:"שתיים",3:"שלוש",4:"ארבע",5:"חמש",
                    6:"שש",7:"שבע",8:"שמונה",9:"תשע"};
  const hundLabels={100:"מאה",200:"מאתיים",300:"שלש מאות",400:"ארבע מאות",
                    500:"חמש מאות",600:"שש מאות",700:"שבע מאות",
                    800:"שמונה מאות",900:"תשע מאות"};
  const parts=[];
  if (mil>0) parts.push({
    str: milStr+"׳",
    label: (milLabels[mil]||mil)+" אלפים",
    sef: MIL_SEF[mil]||"כתר",
    css: sKey(MIL_SEF[mil]||"כתר")
  });
  if (hundV>0) parts.push({
    str: HUNDREDS_STR[hundV]||"",
    label: hundLabels[hundV]||"",
    sef: HUNDREDS_SEF[hundV]||"חסד",
    css: sKey(HUNDREDS_SEF[hundV]||"חסד")
  });
  if (tenV>0) parts.push({
    str: TENS_STR[tenV]||"",
    label: tenLabels[tenV]||"",
    sef: TENS_SEF[tenV]||"חסד",
    css: sKey(TENS_SEF[tenV]||"חסד")
  });
  if (oo>0) parts.push({
    str: UNITS_STR[oo]||"",
    label: unitLabels[oo]||"",
    sef: UNITS_SEF[oo]||"כתר",
    css: sKey(UNITS_SEF[oo]||"כתר")
  });
  return parts;
}

function weekPtzLabel(wn, ptz) {
  const sub=["ד׳","ח׳","ז״א ד׳","נוק׳ ד׳"];
  return (sub[(wn-1)%4]||"ד׳")+ptz;
}

/*
 * Day-of-month sefirah:
 *   1 (א) = כתר  — ראש חודש
 *   30 (ל) = כתר  — ראש חודש
 *   2–29: cycle of 7 starting from חסד
 *     position = (day - 2) % 7  → 0=חסד 1=גבורה 2=תפארת 3=נצח 4=הוד 5=יסוד 6=מלכות
 *   Verify: 2,9,16,23 → (d-2)%7=0 → חסד ✓
 *           5,12,19,26 → (d-2)%7=3 → נצח ✓
 */
const CYCLE_7 = ['חסד','גבורה','תפארת','נצח','הוד','יסוד','מלכות'];

function domSefirah(d) {
  if (d===1 || d===30) return 'כתר';
  return CYCLE_7[(d-2)%7];
}

/* Is today ראש חודש? (day 1 or 30) */
function isRoshChodesh(d) { return d===1||d===30; }

/*
 * sefAbbrev(currentSefirah, includeKeter)
 * Builds the abbreviated sequence string like  כ ח ג ת נ ה י מ
 * with the active one highlighted, others dimmed.
 * The abbreviation letters:
 *   כתר=כ  חסד=ח  גבורה=ג  תפארת=ת  נצח=נ  הוד=ה  יסוד=י  מלכות=מ
 */
/*
 * Full 10 sefirot abbreviation sequence:
 *   חב"ד  = כ(תר) ח(כמה) ב(ינה) ד(עת)
 *   חג"ת  = ח(סד)  ג(בורה) ת(פארת)
 *   נהי"מ = נ(צח) ה(וד) י(סוד) מ(לכות)
 *
 * Keys map each letter to its CSS color class.
 * Note: חכמה and חסד both abbreviate to ח —
 * they share the chesed (blue) color, differentiated by position.
 */
const SEF_ABBREV = [
  {s:'כתר',  a:'כ', k:'keter'},
  {s:'חכמה', a:'ח', k:'chesed'},
  {s:'בינה', a:'ב', k:'hod'},
  {s:'דעת',  a:'ד', k:'tiferet'},
  {s:'חסד',  a:'ח', k:'chesed'},
  {s:'גבורה',a:'ג', k:'gevurah'},
  {s:'תפארת',a:'ת', k:'tiferet'},
  {s:'נצח',  a:'נ', k:'netzach'},
  {s:'הוד',  a:'ה', k:'hod'},
  {s:'יסוד', a:'י', k:'yesod'},
  {s:'מלכות',a:'מ', k:'malchut'}
];

/* Week sefirot (4-week cycle): חכמה בינה תפארת מלכות */
const WEEK_SEF_ABBREV = [
  {s:'חכמה', a:'ח', k:'chesed'},
  {s:'בינה', a:'ב', k:'gevurah'},
  {s:'תפארת',a:'ת', k:'tiferet'},
  {s:'מלכות',a:'מ', k:'malchut'}
];

function sefAbbrevLine(currentSef, list) {
  // Full 11-list:  כ ח ב ד ״ ח ג ת ״ נ ה י מ
  //   group breaks after idx 3 (ד) and idx 6 (ת)
  // 7-list (slice 4): ח ג ת ״ נ ה י מ
  //   group break after idx 2 (ת)
  // 4-list (week):  ח ב ת מ  — no group breaks
  const isFullList = list.length === 11;
  const is7List    = list.length === 7;

  return list.map((item, idx) => {
    const active = item.s === currentSef;
    const letter = active
      ? `<span class="sab-active sab-${item.k}">${item.a}</span>`
      : `<span class="sab-dim">${item.a}</span>`;

    if (idx === list.length - 1) return letter; // last — no separator

    let sep = '<span class="sab-sep">׳</span>';
    if (isFullList && (idx === 3 || idx === 6)) sep = '<span class="sab-grp">״</span>';
    if (is7List    &&  idx === 2)               sep = '<span class="sab-grp">״</span>';

    return letter + sep;
  }).join('');
}

/* 7-cycle (חסד–מלכות): indices 4–10 of the full 11-list */
function sefAbbrev7(currentSef) {
  return sefAbbrevLine(currentSef, SEF_ABBREV.slice(4));
}

/* 10-cycle (כתר–מלכות, all): full list — used for כתר-possible contexts */
function sefAbbrev8(currentSef) {
  return sefAbbrevLine(currentSef, SEF_ABBREV);
}

/* chabad-line: full 10-sefirot abbreviated as כחב"ד|חג"ת|נהי"מ */
function sefAbbrevFull(currentSef) {
  return sefAbbrevLine(currentSef, SEF_ABBREV);
}

/* 4-cycle for week */
function sefAbbrev4(currentSef) {
  return sefAbbrevLine(currentSef, WEEK_SEF_ABBREV);
}

function getHebDate() {
  const parts=new Intl.DateTimeFormat('he-u-ca-hebrew',
    {day:'numeric',month:'long',year:'numeric'}).formatToParts(new Date());
  let d,m,y;
  parts.forEach(x=>{
    if(x.type==='day')   d=parseInt(x.value);
    if(x.type==='month') m=x.value;
    if(x.type==='year')  y=parseInt(x.value);
  });
  return {d,m,y};
}

function mIdx(name) {
  return MONTH_NAMES.findIndex(mn=>mn===name||name.includes(mn)||mn.includes(name));
}

/*
 * Month partzuf/filling label:
 *   Summer months (ניסן=6 through אלול=11, plus תשרי=0):
 *     ב״ן דמ״ה וב״ן דב״ן
 *   Winter months (חשוון=1 through אדר=5):
 *     מ״ה דמ״ה ומ״ה דב״ן
 */
function monthPartzuf(mi) {
  const summer = [0,6,7,8,9,10,11]; // תשרי + ניסן through אלול
  return summer.includes(mi)
    ? 'ב״ן דמ״ה וב״ן דב״ן'
    : 'מ״ה דמ״ה ומ״ה דב״ן';
}

function pt(cx,cy,r,deg) {
  const a=(deg-90)*Math.PI/180;
  return {x:cx+r*Math.cos(a),y:cy+r*Math.sin(a)};
}

function segPath(cx,cy,r1,r2,sa,ea) {
  const G=.6,s=sa+G/2,e=ea-G/2,lg=(e-s)>180?1:0;
  const a=pt(cx,cy,r2,s),b=pt(cx,cy,r2,e),c=pt(cx,cy,r1,e),d=pt(cx,cy,r1,s);
  return `M${a.x},${a.y}A${r2},${r2} 0 ${lg} 1 ${b.x},${b.y}`+
         `L${c.x},${c.y}A${r1},${r1} 0 ${lg} 0 ${d.x},${d.y}Z`;
}

/* ═══════════════════════════════════════
   CURVED TEXT
═══════════════════════════════════════ */
let _pid=0;

function ctext(g,defs,cx,cy,r,sa,ea,text,cls,fs,flt) {
  const id="p"+(++_pid);
  const mid=((sa+ea)/2+360)%360;
  const bot=mid>90&&mid<270;
  let d;
  if (!bot) {
    const p1=pt(cx,cy,r,sa),p2=pt(cx,cy,r,ea),lg=(ea-sa)>180?1:0;
    d=`M${p1.x},${p1.y}A${r},${r} 0 ${lg} 1 ${p2.x},${p2.y}`;
  } else {
    const p1=pt(cx,cy,r,ea),p2=pt(cx,cy,r,sa),lg=(ea-sa)>180?1:0;
    d=`M${p1.x},${p1.y}A${r},${r} 0 ${lg} 0 ${p2.x},${p2.y}`;
  }
  defs.appendChild(mk("path",{id,d,fill:"none"}));
  const tEl=mk("text",{class:cls,"font-size":fs});
  if(flt) tEl.setAttribute("filter",flt);
  const tp=mk("textPath",{href:`#${id}`,startOffset:"50%","text-anchor":"middle"});
  tp.textContent=text;
  tEl.appendChild(tp);
  g.appendChild(tEl);
}

/* ═══════════════════════════════════════
   DRAW GENERIC RING
═══════════════════════════════════════ */
function drawRing(g,defs,cx,cy,r1,r2,items,mxMain,mxSefi) {
  const n=items.length,step=360/n,rH=r2-r1,rMid=(r1+r2)/2,CRAT=.65;

  items.forEach((item,i)=>{
    const s=i*step,e=s+step;
    const sk=item.sefi?sKey(item.sefi):null;

    if (item.active) {
      const hFill=sk
        ? SEFI_COLOR[sk].replace('.95)','.20)')
        : 'rgba(255,210,0,.15)';
      g.appendChild(mk("path",{d:segPath(cx,cy,r1-2,r2+2.5,s,e),fill:hFill,filter:"url(#glow2)"}));
    }

    const segCls=item.active
      ? "seg "+(sk?"seg-"+sk:"seg-act")
      : "seg seg-dim";
    const seg=mk("path",{d:segPath(cx,cy,r1,r2,s,e),class:segCls});
    if(item.active) seg.setAttribute("filter","url(#glow1)");
    g.appendChild(seg);

    const arcLen=2*Math.PI*rMid*(step/360);
    const twoLine=!!item.sefi&&rH>=13;
    let rMain,fsMain,rSefi,fsSefi;

    if(twoLine){
      rMain=r1+rH*.70; rSefi=r1+rH*.28;
      fsMain=Math.min(Math.max(arcLen/(item.label.length*CRAT),4),mxMain||rH*.44);
      fsSefi=Math.min(Math.max(arcLen/(item.sefi.length*CRAT),3.2),mxSefi||rH*.28);
    } else {
      rMain=rMid;
      fsMain=Math.min(Math.max(arcLen/(item.label.length*CRAT),4),mxMain||rH*.65);
    }

    const lCls=item.active?(item.partzuf?"rl-ptz-act":"rl-act"):(item.partzuf?"rl-ptz":"rl");
    ctext(g,defs,cx,cy,rMain,s,e,item.label,lCls,fsMain,item.active?"url(#tglow2)":null);

    if(twoLine&&item.sefi)
      ctext(g,defs,cx,cy,rSefi,s,e,item.sefi,sSvgCls(item.sefi),fsSefi,null);
  });
}

/* ═══════════════════════════════════════
   DRAW HOUR RING
═══════════════════════════════════════ */
function drawHourRing(g,defs,cx,cy,r1,r2,curH) {
  const step=360/24,rH=r2-r1,rMid=(r1+r2)/2,CRAT=.62;

  for(let i=0;i<24;i++){
    const s=i*step,e=s+step,active=i===curH;
    const sk=sKey(HOUR_SEF[i]);

    if(active){
      g.appendChild(mk("path",{
        d:segPath(cx,cy,r1-2,r2+2.5,s,e),
        fill:SEFI_COLOR[sk].replace('.95)','.18)'),
        filter:"url(#glow2)"
      }));
    }

    const seg=mk("path",{
      d:segPath(cx,cy,r1,r2,s,e),
      class:"seg "+(active?"seg-"+sk:"seg-dim")
    });
    if(active) seg.setAttribute("filter","url(#glow1)");
    g.appendChild(seg);

    const arcLen=2*Math.PI*rMid*(step/360);
    const words=HOUR_NAMES[i].split(" ");
    const maxW=Math.max(...words.map(w=>w.length));

    /* Layout from outer→inner:
     *  r1+rH*.88  — hour number (1-12 AM/PM)
     *  r1+rH*.66  — name word 1
     *  r1+rH*.30  — name word 2
     *  r1+rH*.10  — sefirah (active only)
     */
    const fsH=Math.min(Math.max(arcLen/(4*CRAT),2.8),rH*.20);  // hour num font
    const fsW=Math.min(Math.max(arcLen/(maxW*CRAT),3.0),rH*.30); // name font
    const lCls=active?"hn-act":"hn";
    const lFlt=active?"url(#tglow2)":null;

    // Hour number label  e.g. "12AM" or "3PM"
    const h12=(i%12)||12, ap=i<12?"AM":"PM";
    const hourLabel=`${h12}${ap}`;
    const hNumCls=active?"hn-act":"hn-num";
    ctext(g,defs,cx,cy,r1+rH*.88,s,e,hourLabel,hNumCls,fsH,active?"url(#tglow2)":null);

    // Name words — active gets strong double-glow, inactive gets tglow
    const nameFlt = active ? "url(#tglow2)" : "url(#tglow)";
    ctext(g,defs,cx,cy,r1+rH*.66,s,e,words[0],lCls,fsW,nameFlt);
    if(words[1]) ctext(g,defs,cx,cy,r1+rH*.30,s,e,words[1],lCls,fsW,nameFlt);

    // Decorative mid-dot between word rows (all segments)
    {
      const dotCls = active ? "hn-dot-act" : "hn-dot";
      const dotFs  = Math.max(2.5, fsW * 0.55);
      ctext(g,defs,cx,cy,r1+rH*.49,s,e,'·',dotCls,dotFs,null);
    }

    // Sefirah label removed from hour ring per user request
  }
}

/* ═══════════════════════════════════════
   RING TITLE LABEL
   Draws a short curved title at the top of a ring band
   r = midpoint radius of the ring
═══════════════════════════════════════ */
function drawRingTitle(g, defs, cx, cy, r, title) {
  const id = "rt" + (++_pid);
  // Arc at the very top — from 265° to 275° (tiny 10° arc centred at top)
  // We want the text to sit inside the ring gap at the 12-o'clock position
  const span = 18; // degrees each side of top
  const p1 = pt(cx, cy, r, -span), p2 = pt(cx, cy, r, span);
  defs.appendChild(mk("path", {
    id, fill: "none",
    d: `M${p1.x},${p1.y}A${r},${r} 0 0 1 ${p2.x},${p2.y}`
  }));
  const txt = mk("text", {
    "font-family": "Frank Ruhl Libre,serif",
    "font-size": "5.5",
    "font-weight": "900",
    fill: "rgba(255,230,100,.70)",
    filter: "url(#tglow)"
  });
  const tp = mk("textPath", {
    href: `#${id}`,
    startOffset: "50%",
    "text-anchor": "middle"
  });
  tp.textContent = title;
  txt.appendChild(tp);
  g.appendChild(txt);
}

/* ═══════════════════════════════════════
   GLOW NAME
═══════════════════════════════════════ */
function buildGlowName(str) {
  return str.split(" ").map(word=>{
    const chars=word.split("").map((ch,i)=>{
      const dash=i<word.length-1?`<span class="dash-sep">-</span>`:"";
      return `<span class="fc"><span class="b">${ch}</span><span class="g">${ch}</span><span class="s">${ch}</span></span>${dash}`;
    }).join("");
    return `<span class="name-word">${chars}</span>`;
  }).join(`<span style="display:inline-block;width:clamp(6px,1.4vw,18px)"></span>`);
}

/* ═══════════════════════════════════════
   WHEEL
═══════════════════════════════════════ */
function buildWheel(cur) {
  const track=document.getElementById("wheel-track");
  const wheel=document.getElementById("hour-wheel");
  const iW=Math.min(Math.max(44,wheel.offsetWidth*.13),100);
  track.innerHTML="";
  for(let i=0;i<24;i++){
    const adj=Math.abs(i-cur)===1||Math.abs(i-cur)===23;
    const d=document.createElement("div");
    d.className="wi"+(i===cur?" active":adj?" near":"");
    d.style.width=iW+"px";
    const h12=(i%12)||12,ap=i<12?"AM":"PM";
    d.innerHTML=
      `<div class="wh">${h12}${ap}</div>`+
      `<div class="wn">${HOUR_NAMES[i]}</div>`;
    track.appendChild(d);
  }
  track.style.transform=`translateX(${-(cur*iW-wheel.offsetWidth/2+iW/2)}px)`;
}

/* ═══════════════════════════════════════
   FIRE
═══════════════════════════════════════ */
function animateFire() {
  const fb=document.getElementById("fireBg");
  let t=0;
  setInterval(()=>{
    t+=.06;
    const op=.60+Math.sin(t)*.18+Math.sin(t*2.4+1)*.09;
    fb.setAttribute("opacity",op.toFixed(3));
  },40);
}

  /* ── Row 3 — year chips: units→tens→hundreds→mil, then יובל ── */

  /* יובל ס״ז — "יובל" in neutral white, "ס״ז" in gold tiferet */

  document.getElementById("date-line").innerHTML = row1+row1b+row2+row3;

  /* SVG rings */

  drawRing(rG,defs,CX,CY,164,186,

  /* ── Shmita ring (188-203) ── */

  /* Centre */

let lastMin=-1;
function tick() {
  const now=new Date(),h=now.getHours(),m=now.getMinutes();
  const mm=String(m).padStart(2,'0');
  const ss=String(now.getSeconds()).padStart(2,'0');
  const h12=(h%12)||12,ap=h<12?"AM":"PM";
  document.getElementById("clock").textContent=`${h12}:${mm}:${ss} ${ap}`;
  if(h!==lastHour){ update(); return; }
  // Update centre time every minute
  if(m!==lastMin){
    lastMin=m;
    const ci=document.getElementById("cinfo");
    if(ci){
      const tEl=ci.querySelector('[data-centre-time]');
      if(tEl) tEl.textContent=`${h12}:${mm} ${ap}`;
    }
  }
}

/* ═══════════════════════════════════════
   INTERLOCKING STAR OF DAVID LATTICE
   Weaving triangle pattern like the reference image,
   with nested scales + sefirah neon pulses
═══════════════════════════════════════ */
(function initLatticeBg() {
  const cv  = document.getElementById('bgCanvas');
  const ctx = cv.getContext('2d');

  // ── Sefirah neon colors ──
  const NEON = [
    [255,220,0],    // tiferet  gold
    [66,165,245],   // chesed   blue
    [239,83,80],    // gevurah  red
    [0,230,118],    // netzach  green
    [234,128,252],  // hod      magenta
    [179,136,255],  // yesod    violet
  ];

  let W, H, allSegs = [], pulses = [];
  let frame = 0;

  // ── Build one Star of David (interlocking ribbon style) ──
  // Each star = 2 overlapping triangles, each triangle drawn as
  // a thick ribbon with inner parallel lines (the weave illusion)
  function starSegments(cx, cy, R, depth) {
    const segs = [];
    const ribbon = R * 0.13; // ribbon gap
    for (let tri = 0; tri < 2; tri++) {
      const pts = [];
      for (let i = 0; i < 3; i++) {
        const a = (i * 120 + tri * 60 - 90) * Math.PI / 180;
        pts.push([cx + R * Math.cos(a), cy + R * Math.sin(a)]);
      }
      // Outer triangle edges
      for (let i = 0; i < 3; i++) {
        const a = pts[i], b = pts[(i+1)%3];
        segs.push([a[0],a[1],b[0],b[1]]);
      }
      // Inner parallel ribbon lines (offset inward)
      for (let i = 0; i < 3; i++) {
        const a = pts[i], b = pts[(i+1)%3];
        const dx = b[0]-a[0], dy = b[1]-a[1];
        const len = Math.sqrt(dx*dx+dy*dy);
        const nx = -dy/len * ribbon, ny = dx/len * ribbon;
        segs.push([a[0]+nx,a[1]+ny, b[0]+nx,b[1]+ny]);
        segs.push([a[0]-nx,a[1]-ny, b[0]-nx,b[1]-ny]);
      }
      // Inner smaller echo triangle (nesting)
      if (depth > 0) {
        const r2 = R * 0.38;
        for (let i = 0; i < 3; i++) {
          const a2 = (i*120 + tri*60 - 90) * Math.PI/180;
          const p2 = [cx + r2*Math.cos(a2), cy + r2*Math.sin(a2)];
          const a3 = ((i+1)*120 + tri*60 - 90) * Math.PI/180;
          const p3 = [cx + r2*Math.cos(a3), cy + r2*Math.sin(a3)];
          segs.push([p2[0],p2[1],p3[0],p3[1]]);
        }
      }
    }
    // Cross-lines connecting the 6 points (hexagram spokes)
    for (let i = 0; i < 6; i++) {
      const a1 = (i*60 - 90) * Math.PI/180;
      const a2 = ((i+2)*60 - 90) * Math.PI/180;
      segs.push([
        cx + R*Math.cos(a1), cy + R*Math.sin(a1),
        cx + R*Math.cos(a2), cy + R*Math.sin(a2)
      ]);
    }
    return segs;
  }

  function buildGrid() {
    allSegs = [];
    // Three scale levels for infinite nesting feel
    const scales = [
      { R: Math.min(W,H)*0.09, depth:2 },
      { R: Math.min(W,H)*0.045, depth:1 },
      { R: Math.min(W,H)*0.022, depth:0 },
    ];
    scales.forEach(({R, depth}) => {
      const spacingX = R * 2.0;
      const spacingY = R * 1.74;
      const cols = Math.ceil(W/spacingX) + 4;
      const rows = Math.ceil(H/spacingY) + 4;
      for (let row = -2; row < rows; row++) {
        for (let col = -2; col < cols; col++) {
          const cx = col * spacingX + (row%2===1 ? spacingX*0.5 : 0);
          const cy = row * spacingY;
          starSegments(cx, cy, R, depth).forEach(s => allSegs.push(s));
        }
      }
    });
    // Seed pulses
    pulses = [];
    for (let i = 0; i < 30; i++) spawnPulse(i);
  }

  function spawnPulse(seed) {
    if (!allSegs.length) return;
    const ri  = Math.abs(Math.floor(Math.sin((seed||Math.random())*7919)*allSegs.length+allSegs.length)) % allSegs.length;
    const ci  = (seed||0) % NEON.length;
    const [r,g,b] = NEON[ci];
    pulses.push({
      seg:   allSegs[ri],
      t:     Math.random(),
      dir:   seed%2===0 ? 1 : -1,
      speed: 0.003 + Math.random()*0.007,
      r,g,b,
      alpha: 0.5 + Math.random()*0.45,
      width: 1.2 + Math.random()*2.2,
      age:   Math.random() * Math.PI,
    });
  }

  function resize() {
    W = cv.width  = window.innerWidth;
    H = cv.height = window.innerHeight;
    buildGrid();
  }

  function draw() {
    ctx.clearRect(0, 0, W, H);

    // ── Draw base lattice ──
    ctx.save();
    ctx.globalAlpha  = 1;
    ctx.strokeStyle  = 'rgba(255,215,80,.09)';
    ctx.lineWidth    = 0.55;
    ctx.shadowBlur   = 0;
    allSegs.forEach(([x0,y0,x1,y1]) => {
      ctx.beginPath(); ctx.moveTo(x0,y0); ctx.lineTo(x1,y1); ctx.stroke();
    });
    ctx.restore();

    // ── Draw neon pulses ──
    pulses.forEach(p => {
      const [ax,ay,bx,by] = p.seg;
      const fade = Math.max(0, Math.sin(p.age));
      const a    = p.alpha * fade;
      if (a < 0.01) return;

      // Tail gradient
      const tailT  = Math.max(0, Math.min(1, p.t - p.dir * 0.18));
      const hx0    = ax+(bx-ax)*Math.min(p.t,tailT);
      const hy0    = ay+(by-ay)*Math.min(p.t,tailT);
      const hx1    = ax+(bx-ax)*Math.max(p.t,tailT);
      const hy1    = ay+(by-ay)*Math.max(p.t,tailT);
      const grd    = ctx.createLinearGradient(hx0,hy0,hx1,hy1);
      const isHead = p.dir===1; // head at hx1/hy1 when going forward
      grd.addColorStop(0, `rgba(${p.r},${p.g},${p.b},${isHead?0:a})`);
      grd.addColorStop(1, `rgba(${p.r},${p.g},${p.b},${isHead?a:0})`);

      ctx.save();
      ctx.strokeStyle = grd;
      ctx.lineWidth   = p.width;
      ctx.lineCap     = 'round';
      ctx.shadowBlur  = 10;
      ctx.shadowColor = `rgba(${p.r},${p.g},${p.b},${a*0.8})`;
      ctx.beginPath(); ctx.moveTo(hx0,hy0); ctx.lineTo(hx1,hy1); ctx.stroke();

      // Bright head
      const hx = ax+(bx-ax)*p.t, hy = ay+(by-ay)*p.t;
      ctx.beginPath(); ctx.arc(hx,hy,p.width*1.1,0,Math.PI*2);
      ctx.fillStyle  = `rgba(255,255,255,${a*0.95})`;
      ctx.shadowBlur = 16;
      ctx.shadowColor= `rgba(${p.r},${p.g},${p.b},1)`;
      ctx.fill();
      ctx.restore();

      // Advance
      p.t   += p.speed * p.dir;
      p.age += 0.014;
      if (p.t>=1){p.t=1;p.dir=-1;}
      if (p.t<=0){p.t=0;p.dir= 1;}
    });

    // Cull dead, spawn fresh
    if (frame % 6 === 0) {
      pulses = pulses.filter(p => p.age < Math.PI);
      while (pulses.length < 32) spawnPulse(frame * 3 + pulses.length);
    }

    frame++;
    requestAnimationFrame(draw);
  }

  resize();
  window.addEventListener('resize', resize);
  draw();
})();
</script>
</body>
</html>
