/* ═══════════════════════════════════════

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

}

  color: var(--text);

  background:
    radial-gradient(ellipse 70% 50% at 50% 30%,  rgba(255,200,0,.14)  0%, transparent 52%),
    radial-gradient(ellipse 45% 35% at 8%  42%,  rgba(30,140,255,.12) 0%, transparent 58%),

}

  display: flex;
  align-items: center;
  position: absolute;
  left: 0;
  will-change: transform;
  transition: transform .7s cubic-bezier(.4,0,.2,1);
}
.wi {
  flex: 0 0 auto;
  width: 13vw; min-width:44px; max-width:100px;
  text-align: center;
  padding: 3px 2px;
  border-right: 1px solid rgba(255,215,0,.05);
  opacity: .44;
  transition: opacity .4s;
}
.wi .wh { font-size:clamp(5px,1.0vw,9px);  color:#4a3a06; margin-bottom:1px; letter-spacing:.5px; }
.wi .wn { font-size:clamp(5px,1.1vw,10px); color:#6a5a18; line-height:1.25; direction:rtl; }
/* .wi .ws removed — sefirah not shown in wheel */

.wi.near { opacity:.70; }
.wi.near .wh { color:#8a6a20; }
.wi.near .wn { color:#9a7a28; }

.wi.active { opacity:1; }
.wi.active .wh {
  color:var(--gold3);
  text-shadow:0 0 8px var(--gold),0 0 18px rgba(255,200,0,.55);
  letter-spacing:1px;
}
.wi.active .wn {
  color:#fff; font-weight:700;
  text-shadow:0 0 6px var(--gold),0 0 14px var(--gold2),0 0 30px var(--ember);
}
.wi.active .ws { color:#d4aa30; }

#hour-wheel::before,
#hour-wheel::after {
  content:""; position:absolute; top:0; bottom:0;
  width:20%; z-index:2; pointer-events:none;
}
#hour-wheel::before { left:0; background:linear-gradient(to right,var(--bg) 25%,transparent); }
#hour-wheel::after  { right:0; background:linear-gradient(to left, var(--bg) 25%,transparent); }

#wheel-marker {
  position:absolute; top:0; bottom:0; left:50%;
  transform:translateX(-50%);
  width:13vw; min-width:44px; max-width:100px;
  border-left:1px solid rgba(255,220,0,.30);
  border-right:1px solid rgba(255,220,0,.30);
  background:linear-gradient(to bottom,rgba(255,220,0,.08),rgba(255,140,0,.04));
  pointer-events:none; z-index:1;
}
#wheel-marker::before {
  content:"";
  position:absolute; top:0; left:0; right:0; height:2px;
  background:linear-gradient(to right,transparent,var(--gold),transparent);
  opacity:.75;
}

/* ═══════════════════════════════════════
   SVG RING CLASSES
═══════════════════════════════════════ */
.seg         { stroke:var(--bg); stroke-width:.55; }
.seg-dim     { fill:rgba(255,220,0,.04); }
.seg-act     { fill:rgba(255,220,0,.16); }

/* Per-sefirah active segment fills */
.seg-chesed  { fill:rgba(66,165,245,.30);  stroke:rgba(66,165,245,.18); }
.seg-gevurah { fill:rgba(239,83,80,.30);   stroke:rgba(239,83,80,.18); }
.seg-tiferet { fill:rgba(255,214,0,.28);   stroke:rgba(255,214,0,.18); }
.seg-netzach { fill:rgba(0,230,118,.28);   stroke:rgba(0,230,118,.18); }
.seg-hod     { fill:rgba(234,128,252,.30); stroke:rgba(234,128,252,.18); }
.seg-yesod   { fill:rgba(179,136,255,.30); stroke:rgba(179,136,255,.18); }
.seg-malchut { fill:rgba(255,145,0,.30);   stroke:rgba(255,145,0,.18); }
.seg-keter   { fill:rgba(232,232,255,.25);  stroke:rgba(232,232,255,.15); }

/* Ring labels */
.rl     { font-family:'Frank Ruhl Libre','Arial Hebrew','Noto Sans Hebrew','David',serif; fill:rgba(225,185,35,.85); font-weight:700; }
.rl-act { font-family:'Frank Ruhl Libre','Arial Hebrew','Noto Sans Hebrew','David',serif; fill:#FFFFFF; font-weight:900; }
.rl-ptz     { font-family:'Frank Ruhl Libre','Arial Hebrew','Noto Sans Hebrew','David',serif; fill:rgba(255,209,128,.80); font-weight:700; }
.rl-ptz-act { font-family:'Frank Ruhl Libre','Arial Hebrew','Noto Sans Hebrew','David',serif; fill:#FFD180; font-weight:900; }

/* Sefirah sub-labels — vivid */
.rs-keter   { font-family:'Frank Ruhl Libre','Arial Hebrew','Noto Sans Hebrew','David',serif; fill:#E8E8FF; filter:url(#tglow); }
.rs-chesed  { font-family:'Frank Ruhl Libre','Arial Hebrew','Noto Sans Hebrew','David',serif; fill:#64B5F6; }
.rs-gevurah { font-family:'Frank Ruhl Libre','Arial Hebrew','Noto Sans Hebrew','David',serif; fill:#EF9A9A; }
.rs-tiferet { font-family:'Frank Ruhl Libre','Arial Hebrew','Noto Sans Hebrew','David',serif; fill:#FFE57F; }
.rs-netzach { font-family:'Frank Ruhl Libre','Arial Hebrew','Noto Sans Hebrew','David',serif; fill:#69F0AE; }
.rs-hod     { font-family:'Frank Ruhl Libre','Arial Hebrew','Noto Sans Hebrew','David',serif; fill:#F48FB1; }
.rs-yesod   { font-family:'Frank Ruhl Libre','Arial Hebrew','Noto Sans Hebrew','David',serif; fill:#CE93D8; }
.rs-malchut { font-family:'Frank Ruhl Libre','Arial Hebrew','Noto Sans Hebrew','David',serif; fill:#FFCC80; }

/* Hour name ring — inactive: warm gold glow */
.hn {
  font-family:'Frank Ruhl Libre','Arial Hebrew','Noto Sans Hebrew','David',serif;
  fill:rgba(240,195,50,.88);
  filter:url(#tglow);
  letter-spacing:.03em;
}
/* Active hour name — bright white with strong bloom */
.hn-act {
  font-family:'Frank Ruhl Libre','Arial Hebrew','Noto Sans Hebrew','David',serif;
  fill:#FFFFFF;
  font-weight:900;
  letter-spacing:.04em;
}
/* Hour number label — cyan, distinct from name gold */
.hn-num {
  font-family:'Frank Ruhl Libre','Arial Hebrew','Noto Sans Hebrew','David',serif;
  fill:rgba(100,185,255,.72);
  font-weight:300;
  letter-spacing:.05em;
}

/* Centre */
.c-main { font-family:'Frank Ruhl Libre','Arial Hebrew','Noto Sans Hebrew','David',serif; fill:#FFFFFF; font-weight:900; text-anchor:middle; dominant-baseline:central;
          filter:url(#tglow2); }
.c-sub  { font-family:'Frank Ruhl Libre','Arial Hebrew','Noto Sans Hebrew','David',serif; fill:rgba(235,200,60,.95); text-anchor:middle; dominant-baseline:central;
          filter:url(#tglow); }
/* Decorative dot between name rows in hour ring */
.hn-dot     { font-family:'Frank Ruhl Libre','Arial Hebrew','Noto Sans Hebrew','David',serif; fill:rgba(200,160,30,.35); }
.hn-dot-act { font-family:'Frank Ruhl Libre','Arial Hebrew','Noto Sans Hebrew','David',serif; fill:rgba(255,220,100,.65); filter:url(#tglow); }

/* ═══════════════════════════════════════
   WHITE BACKGROUND OVERRIDES
   Applied via body.bg-white — keeps sefirah hues
   but removes glows/text-shadows tuned for dark bg
   and darkens neutral text for contrast on white.
═══════════════════════════════════════ */

</div>
