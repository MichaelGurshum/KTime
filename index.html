/* ═══════════════════════════════════════
   DESIGN TOKENS — vivid Kabbalistic palette
═══════════════════════════════════════ */
:root {
  --gold:      #FFE000;
  --gold2:     #FFB300;
  --gold3:     #FFF176;
  --ember:     #FF6D00;
  --ember2:    #FF3D00;

  /* Sefirah signature colors — full saturation */
  --chesed:    #42A5F5;
  --gevurah:   #EF5350;
  --tiferet:   #FFD600;
  --netzach:   #00E676;
  --hod:       #EA80FC;
  --yesod:     #B388FF;
  --malchut:   #FF9100;

  --bg:        #05030D;
  --text:      #F5E6C8;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html {
  font-size: clamp(10px, 1.6vmin, 18px);
}
html, body {
  width: 100%; height: 100%;

/* ── Vivid jewel-tone ambient background ── */
body::before {
  content: "";
  position: fixed; inset: 0; pointer-events: none; z-index: 0;
  background:
    /* Central gold-amber crown */
    radial-gradient(ellipse 70% 50% at 50% 30%,  rgba(255,200,0,.22)    0%, transparent 52%),
    /* Chesed — electric blue, left */
    radial-gradient(ellipse 45% 35% at 8% 42%,   rgba(30,140,255,.20)   0%, transparent 58%),
    /* Gevurah — deep crimson, right */
    radial-gradient(ellipse 45% 35% at 92% 42%,  rgba(220,40,60,.18)    0%, transparent 58%),
    /* Netzach — vivid green, lower-left */
    radial-gradient(ellipse 35% 28% at 15% 78%,  rgba(0,210,100,.16)    0%, transparent 55%),
    /* Hod — magenta, lower-right */
    radial-gradient(ellipse 35% 28% at 85% 78%,  rgba(210,80,255,.16)   0%, transparent 55%),
    /* Yesod — violet, bottom-centre */
    radial-gradient(ellipse 50% 30% at 50% 96%,  rgba(130,80,255,.18)   0%, transparent 58%),
    /* Tiferet — warm yellow heart */
    radial-gradient(ellipse 28% 22% at 50% 52%,  rgba(255,220,0,.10)    0%, transparent 48%),

    radial-gradient(ellipse 100% 100% at 50% 50%, rgba(15,8,35,.0) 0%, rgba(5,3,13,1) 100%);

body::after {

/* ═══════════════════════════════════════
   RING AREA
═══════════════════════════════════════ */
#ring-wrap {
  width: 100%;
  height: 100%;
  min-height: 0;
  display: flex;

}

/* ═══════════════════════════════════════
   HOUR WHEEL
═══════════════════════════════════════ */
#hour-wheel {
  width: 100%;
  height: clamp(46px,8.5vh,90px);
  overflow: hidden;
  position: relative;
  background: linear-gradient(to bottom, rgba(8,5,14,.9), rgba(3,2,7,.98));
  border-top: 1px solid rgba(255,210,0,.14);
  display: flex;
  align-items: center;
}
#wheel-track {
  display: flex;
  align-items: center;
  position: absolute;
  left: 0;
  will-change: transform;
  transition: transform .7s cubic-bezier(.4,0,.2,1);
}
.wi {
  flex: 0 0 auto;
  width: 13vw; min-width:44px; max-width:100px;
  text-align: center;
  padding: 3px 2px;
  border-right: 1px solid rgba(255,215,0,.05);
  opacity: .44;
  transition: opacity .4s;
}
.wi .wh { font-size:clamp(5px,1.0vw,9px);  color:#4a3a06; margin-bottom:1px; letter-spacing:.5px; }
.wi .wn { font-size:clamp(5px,1.1vw,10px); color:#6a5a18; line-height:1.25; direction:rtl; }
/* .wi .ws removed — sefirah not shown in wheel */

.wi.near { opacity:.70; }
.wi.near .wh { color:#8a6a20; }
.wi.near .wn { color:#9a7a28; }

.wi.active { opacity:1; }
.wi.active .wh {
  color:var(--gold3);
  text-shadow:0 0 8px var(--gold),0 0 18px rgba(255,200,0,.55);
  letter-spacing:1px;
}
.wi.active .wn {
  color:#fff; font-weight:700;
  text-shadow:0 0 6px var(--gold),0 0 14px var(--gold2),0 0 30px var(--ember);
}
.wi.active .ws { color:#d4aa30; }

#hour-wheel::before,
#hour-wheel::after {
  content:""; position:absolute; top:0; bottom:0;
  width:20%; z-index:2; pointer-events:none;
}
#hour-wheel::before { left:0; background:linear-gradient(to right,var(--bg) 25%,transparent); }
#hour-wheel::after  { right:0; background:linear-gradient(to left, var(--bg) 25%,transparent); }

#wheel-marker {
  position:absolute; top:0; bottom:0; left:50%;
  transform:translateX(-50%);
  width:13vw; min-width:44px; max-width:100px;
  border-left:1px solid rgba(255,220,0,.30);
  border-right:1px solid rgba(255,220,0,.30);
  background:linear-gradient(to bottom,rgba(255,220,0,.08),rgba(255,140,0,.04));
  pointer-events:none; z-index:1;
}
#wheel-marker::before {
  content:"";
  position:absolute; top:0; left:0; right:0; height:2px;
  background:linear-gradient(to right,transparent,var(--gold),transparent);
  opacity:.75;
}

.rl-ptz-act { font-family:'Frank Ruhl Libre',serif; fill:#FFD180; font-weight:900; }

/* Sefirah sub-labels — vivid */
.rs-keter   { font-family:'Frank Ruhl Libre',serif; fill:#E8E8FF; filter:url(#tglow); }

.hn {

  letter-spacing:.03em;
}

  font-weight:300;
  letter-spacing:.05em;
}

/* Centre */
.c-main { font-family:'Frank Ruhl Libre',serif; fill:#FFFFFF; font-weight:900; text-anchor:middle; dominant-baseline:central;
          filter:url(#tglow2); }
.c-sub  { font-family:'Frank Ruhl Libre',serif; fill:rgba(235,200,60,.95); text-anchor:middle; dominant-baseline:central;
          filter:url(#tglow); }
/* Decorative dot between name rows in hour ring */
.hn-dot     { font-family:'Frank Ruhl Libre',serif; fill:rgba(200,160,30,.35); }
.hn-dot-act { font-family:'Frank Ruhl Libre',serif; fill:rgba(255,220,100,.65); filter:url(#tglow); }
